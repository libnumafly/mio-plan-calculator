<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IIJmio プラン組み合わせ計算機</title>
        <script src="wasm_exec.js"></script>
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              background: #f0f4f8;
              color: #1a202c;
              padding: 2rem 1rem;
            }
            .container { max-width: 720px; margin: 0 auto; }
            h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
            h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; color: #2d3748; }

            .card {
              background: #fff;
              border-radius: 12px;
              padding: 1.5rem;
              margin-bottom: 1.25rem;
              box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            }

            /* Plans table */
            table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
            th, td { padding: 0.5rem 0.75rem; text-align: center; border-bottom: 1px solid #e2e8f0; }
            th { background: #edf2f7; font-weight: 600; }
            tr:last-child td { border-bottom: none; }

            /* Form */
            .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; }
            label { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.9rem; font-weight: 500; }
            input[type=number] {
              padding: 0.5rem 0.75rem;
              border: 1px solid #cbd5e0;
              border-radius: 8px;
              font-size: 1rem;
              width: 100%;
            }
            input[type=number]:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.2); }

            button {
              margin-top: 1.25rem;
              padding: 0.65rem 2rem;
              background: #4299e1;
              color: #fff;
              border: none;
              border-radius: 8px;
              font-size: 1rem;
              font-weight: 600;
              cursor: pointer;
              transition: background 0.15s;
            }
            button:hover:not(:disabled) { background: #3182ce; }
            button:disabled { background: #a0aec0; cursor: not-allowed; }
            .btn-group { display: flex; gap: 0.75rem; flex-wrap: wrap; }

            /* Result */
            #result { display: none; }
            .result-summary {
              display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;
            }
            .stat {
              flex: 1; min-width: 140px;
              background: #ebf8ff;
              border-radius: 8px;
              padding: 0.75rem 1rem;
            }
            .stat .label { font-size: 0.78rem; color: #4a5568; margin-bottom: 0.2rem; }
            .stat .value { font-size: 1.3rem; font-weight: 700; color: #2b6cb0; }
            .stat.highlight { background: #e6fffa; }
            .stat.highlight .value { color: #276749; }

            .combo-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
            .combo-list li {
              background: #f7fafc;
              border: 1px solid #e2e8f0;
              border-radius: 8px;
              padding: 0.6rem 1rem;
              font-size: 0.9rem;
            }
            .combo-list li .per-gb {
              color: #2b6cb0;
              font-weight: 600;
              margin-right: 0.75rem;
              font-size: 0.85rem;
              background: #ebf8ff;
              border-radius: 4px;
              padding: 0.1rem 0.4rem;
            }

            /* Range table */
            #range-result { display: none; }
            .range-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
            .range-table th, .range-table td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #e2e8f0; text-align: center; }
            .range-table th { background: #edf2f7; font-weight: 600; position: sticky; top: 0; }
            .range-table tr:last-child td { border-bottom: none; }
            .range-table td.combos { text-align: left; font-size: 0.8rem; color: #4a5568; }
            .range-table tr.no-result td { color: #a0aec0; font-style: italic; }
            .range-scroll { max-height: 420px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
              background: #fff5f5;
              border: 1px solid #fc8181;
              color: #c53030;
              border-radius: 8px;
              padding: 0.75rem 1rem;
              font-size: 0.9rem;
            }

            #loading { color: #718096; font-size: 0.85rem; margin-top: 0.5rem; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>IIJmio プラン組み合わせ計算機</h1>

            <div class="card">
                <h2>料金プラン一覧</h2>
                <table>
                    <thead>
                        <tr>
                            <th>容量</th>
                            <th>月額</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2GB</td>
                            <td>¥850</td>
                        </tr>
                        <tr>
                            <td>5GB</td>
                            <td>¥950</td>
                        </tr>
                        <tr>
                            <td>10GB</td>
                            <td>¥1,400</td>
                        </tr>
                        <tr>
                            <td>15GB</td>
                            <td>¥1,600</td>
                        </tr>
                        <tr>
                            <td>25GB</td>
                            <td>¥2,000</td>
                        </tr>
                        <tr>
                            <td>35GB</td>
                            <td>¥2,400</td>
                        </tr>
                        <tr>
                            <td>45GB</td>
                            <td>¥3,300</td>
                        </tr>
                        <tr>
                            <td>55GB</td>
                            <td>¥3,900</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>条件を指定</h2>
                <div class="form-grid">
                    <label>
                        回線数
                        <input
                            type="number"
                            id="lines"
                            value="4"
                            min="1"
                            max="20"
                        />
                    </label>
                    <label>
                        最低容量 (GB)
                        <input type="number" id="minGB" value="25" min="1" />
                    </label>
                    <label>
                        最高容量 (GB)
                        <input type="number" id="maxGB" value="45" min="1" />
                    </label>
                </div>
                <div class="btn-group">
                    <button id="calcBtn" onclick="calculate()" disabled>
                        計算中…
                    </button>
                    <button
                        id="rangeBtn"
                        onclick="calculateRange()"
                        disabled
                        style="background: #667eea"
                    >
                        計算中…
                    </button>
                </div>
                <div id="loading">WASMを読み込んでいます...</div>
            </div>

            <div class="card" id="result"></div>
            <div class="card" id="range-result"></div>
        </div>

        <script>
            let wasmReady = false;

            const go = new Go();
            WebAssembly.instantiateStreaming(
                fetch("main.wasm"),
                go.importObject,
            )
                .then((res) => {
                    go.run(res.instance);
                    wasmReady = true;
                    const btn = document.getElementById("calcBtn");
                    btn.disabled = false;
                    btn.textContent = "最安値を計算";
                    const rangeBtn = document.getElementById("rangeBtn");
                    rangeBtn.disabled = false;
                    rangeBtn.textContent = "1GB単位で一覧表示";
                    document.getElementById("loading").textContent = "";
                })
                .catch((err) => {
                    document.getElementById("loading").textContent =
                        "WASMの読み込みに失敗しました: " + err;
                });

            function calculate() {
                if (!wasmReady) return;
                const lines = parseInt(
                    document.getElementById("lines").value,
                    10,
                );
                const minGB = parseInt(
                    document.getElementById("minGB").value,
                    10,
                );
                const maxGB = parseInt(
                    document.getElementById("maxGB").value,
                    10,
                );

                const resultDiv = document.getElementById("result");
                resultDiv.style.display = "block";

                if (
                    isNaN(lines) ||
                    isNaN(minGB) ||
                    isNaN(maxGB) ||
                    lines < 1 ||
                    minGB < 1 ||
                    maxGB < minGB
                ) {
                    resultDiv.innerHTML = `<div class="error">⚠️ 入力値が不正です。回線数・容量を正しく入力してください。</div>`;
                    return;
                }

                const res = findCheapest(lines, minGB, maxGB);

                if (!res.found) {
                    resultDiv.innerHTML = `<div class="error">⚠️ ${res.message}</div>`;
                    return;
                }

                const fmt = (n) => n.toLocaleString("ja-JP");

                let html = `
      <h2>計算結果</h2>
      <div class="result-summary">
        <div class="stat">
          <div class="label">プラン合計（割引前）</div>
          <div class="value">¥${fmt(res.bestCost)}<span style="font-size:0.8rem;font-weight:400">/月</span></div>
        </div>
        <div class="stat">
          <div class="label">割引（${lines}回線 × ¥100）</div>
          <div class="value">－¥${fmt(res.discount)}</div>
        </div>
        <div class="stat highlight">
          <div class="label">最安値（割引後）</div>
          <div class="value">¥${fmt(res.finalCost)}<span style="font-size:0.8rem;font-weight:400">/月</span></div>
        </div>
      </div>
      <h2>最安の組み合わせ（${res.combos.length}パターン）</h2>
      <ul class="combo-list">
    `;
                for (const combo of res.combos) {
                    html += `<li><span class="gb">合計 ${combo.totalGB}GB</span><span class="per-gb">¥${combo.pricePerGB.toFixed(1)}/GB</span>${combo.label}</li>`;
                }
                html += `</ul>`;
                resultDiv.innerHTML = html;
            }

            function calculateRange() {
                if (!wasmReady) return;
                const lines = parseInt(
                    document.getElementById("lines").value,
                    10,
                );
                const minGB = parseInt(
                    document.getElementById("minGB").value,
                    10,
                );
                const maxGB = parseInt(
                    document.getElementById("maxGB").value,
                    10,
                );

                const rangeDiv = document.getElementById("range-result");
                rangeDiv.style.display = "block";

                if (
                    isNaN(lines) ||
                    isNaN(minGB) ||
                    isNaN(maxGB) ||
                    lines < 1 ||
                    minGB < 1 ||
                    maxGB < minGB
                ) {
                    rangeDiv.innerHTML = `<div class="error">⚠️ 入力値が不正です。回線数・容量を正しく入力してください。</div>`;
                    return;
                }

                const fmtN = (n) => n.toLocaleString("ja-JP");

                let html = `<h2>1GB単位の一覧（${minGB}GB〜${maxGB}GB）</h2>
    <div class="range-scroll"><table class="range-table">
      <thead><tr><th>合計GB</th><th>最安値(割引後)</th><th>単価(/GB)</th><th>組み合わせ</th></tr></thead>
      <tbody>`;

                for (let gb = minGB; gb <= maxGB; gb++) {
                    const res = findCheapest(lines, gb, gb);
                    if (!res.found) {
                        html += `<tr class="no-result"><td>${gb}GB</td><td colspan="3">組み合わせなし</td></tr>`;
                    } else {
                        const comboLabels = res.combos
                            .map((c) => c.label)
                            .join("<br>");
                        const perGB = res.finalCost / gb;
                        html += `<tr>
          <td><strong>${gb}GB</strong></td>
          <td>¥${fmtN(res.finalCost)}</td>
          <td>¥${perGB.toFixed(1)}</td>
          <td class="combos">${comboLabels}</td>
        </tr>`;
                    }
                }

                html += `</tbody></table></div>`;
                rangeDiv.innerHTML = html;
            }
        </script>
    </body>
</html>
